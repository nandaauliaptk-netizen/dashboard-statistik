<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Statistik</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Dashboard Statistik</h1>
        <p>Contoh tampilan data statistik sederhana</p>
    </header>

    <main>
        <section class="card">
            <h2>Jumlah Pengunjung</h2>
            <p class="stat-number">1,245</p>
            <p>Data pengunjung bulan ini</p>
        </section>

        <section class="card">
            <h2>Rata-rata Penjualan</h2>
            <p class="stat-number">532</p>
            <p>Unit per minggu</p>
        </section>

        <section class="card">
            <h2>Persentase Kepuasan</h2>
            <p class="stat-number">87%</p>
            <p>Hasil survei pelanggan</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Dashboard Statistik Demo</p>
    </footer>
</body>
</html>
